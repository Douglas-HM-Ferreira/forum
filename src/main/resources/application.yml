server:
  port: 8080

spring:
  application:
    name: forum-api

  datasource:
    url: jdbc:postgresql://localhost:5433/forum_db
    username: forum_user
    password: forum_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

api:
  security:
    token:
      secret: ${JWT_SECRET:mude-esse-secret-em-producao}
      expiration-hours: 2
      refresh-expiration-days: 7

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
